<!DOCTYPE html>
<html>

<head>
<title>Scoopie Prize</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Baloo 2', cursive;
text-align:center;

background:linear-gradient(
120deg,
#ffd6ec,
#ffe0f2,
#f3bbda,
#ffa1d2,
#f3bbda,
#ffe0f2,
#ffd6ec
);

height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding-top:400px;

overflow:hidden;
}

/* CARD */

.container{
background:white;
padding:40px 22px;
width:550px;

border-radius:45px;

box-shadow:
0 15px 35px rgba(255,120,180,0.25),
0 0 0 8px #ffd9ec,
0 0 0 14px #ffe9f5;

position:relative;
z-index:3;
}

/* STAR */

.star{
font-size:95px;
color:#ff9acb;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

/* WIN TEXT */

.win{
font-size:40px;
color:#ff5fa8;
animation:pop 0.9s ease;
}

@keyframes pop{
0%{transform:scale(0);}
70%{transform:scale(1.2);}
100%{transform:scale(1);}
}

/* SPARKLE */

.sparkle{
font-size:28px;
animation:blink 1.5s infinite alternate;
}

@keyframes blink{
from{opacity:0.3;}
to{opacity:1;}
}

/* HADIAH TEXT */

.prize{
color:#ff6fb5;
font-size:36px;
margin:15px 0;
}

/* RUNNING TEXT FULL LAYAR */

.ticker{
margin-top:55px;
width:100%;
white-space:nowrap;
overflow:hidden;
font-size:34px;
font-weight:700;
color:#ff4fa3;
}

.ticker span{
display:inline-block;
padding-left:100%;
animation:scroll 8s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* CONFETTI */

.confetti{
position:absolute;
width:10px;
height:10px;
top:-10px;
animation:fall linear infinite;
opacity:0.9;
border-radius:3px;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

</style>

</head>

<body>

<div class="container">

<div class="sparkle">✨🌸✨</div>

<div class="star">★</div>

<div class="win">YOU WON!</div>

<h2 class="prize">You got a PINK bottle!</h2>

<div class="sparkle">🌸✨🌸</div>

</div>

<div class="ticker">
<span>🌸 Show this screen to the cashier to claim your prize 🌸</span>
</div>

<script>

let colors=[
"#ff7fbf",
"#ffb6dc",
"#ffc2e2",
"#ff9acb",
"#ffd6ec",
"#ff8cc6"
];

for(let i=0;i<180;i++){

let confetti=document.createElement("div");
confetti.className="confetti";

confetti.style.left=Math.random()*100+"%";
confetti.style.background=colors[Math.floor(Math.random()*colors.length)];

confetti.style.animationDuration=(Math.random()*5+3)+"s";
confetti.style.width=(Math.random()*8+6)+"px";
confetti.style.height=confetti.style.width;

document.body.appendChild(confetti);

}

</script>

</body>
</html>
