<!DOCTYPE html>
<html>

<head>
<title>Scoopie Result</title>

<style>

body{
margin:0;
font-family:"Comic Sans MS", Arial;
text-align:center;

/* DARK GRADIENT */

background: linear-gradient(
120deg,
#0f0f0f,
#1a1a1a,
#2a2a2a,
#1a1a1a,
#0f0f0f
);

height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding-top:400px;

overflow:hidden;
}

/* CARD */

.container{
background:#1f1f1f;
padding:80px 35px;
width:530px;

border-radius:35px;

box-shadow:
0 15px 35px rgba(0,0,0,0.6),
0 0 0 6px #2a2a2a,
0 0 0 12px #111;

position:relative;
z-index:2;
}

/* PIXEL SKULL */

.skull{
font-size:80px;
filter:grayscale(100%);
animation:bounce 2s infinite;
margin-bottom:25px; /* tambah ini */
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-8px);}
}

/* TEXT */

.lose{
font-size:35px;
color:#bbb;
letter-spacing:1px;
margin:16px 10px
}

h2{
font-size:33px;
color:#888;
margin:7px 15px;
}

p{
color:#777;
font-size:30px;
}

/* CONFETTI DARK */

.confetti{
position:absolute;
top:-10px;
border-radius:2px;
animation:fall linear infinite;
opacity:0.7;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

</style>

</head>

<body>

<!-- DARK CONFETTI -->

<script>

let colors=[
"#ffffff",  // putih
"#000000",  // hitam
"#444444",  // abu tua
"#aaaaaa"   // abu muda
];

for(let i=0;i<120;i++){

let confetti=document.createElement("div");
confetti.className="confetti";

confetti.style.left=Math.random()*100+"%";

let size=Math.random()*8+4;
confetti.style.width=size+"px";
confetti.style.height=size+"px";

confetti.style.background=colors[Math.floor(Math.random()*colors.length)];

confetti.style.animationDuration=(Math.random()*5+3)+"s";

document.body.appendChild(confetti);

}

</script>

<div class="container">

<div class="skull">☠️</div>

<div class="lose">NO PRIZE</div>

<h2>Oops... not this time!</h2>

<p>Try again.</p>

</div>

</body>

</html>
