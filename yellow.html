<!DOCTYPE html>
<html>

<head>
<title>Scoopie Prize</title>

<link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@500;600&family=Baloo+2:wght@500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Baloo 2', cursive;
text-align:center;

background:linear-gradient(
120deg,
#f5f3e6,
#fdf1aa,
#ffe18a,
#fdd03c,
#ffe18a,
#fdf1aa,
#f5f3e6
);

height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding-top:400px;

overflow:hidden;
}

/* CARD */

.container{
background:#fffaf0;
padding:40px 22px;   
width:550px;        

border-radius:45px;

box-shadow:
0 15px 35px rgba(110, 90, 54, 0.25),
0 0 0 8px #f4e6c4,
0 0 0 14px #fff4db;

position:relative;
z-index:3;
}

/* STAR */

.star{
font-size:120px;
color:#ffe27a;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

/* TITLE */

.win{
font-size:40px;
font-family:'DynaPuff', cursive;
color:#8b5e3c;
animation:pop 0.9s ease;
}

@keyframes pop{
0%{transform:scale(0);}
70%{transform:scale(1.25);}
100%{transform:scale(1);}
}

/* SPARKLE */

.sparkle{
font-size:28px;
animation:blink 1.5s infinite alternate;
}

@keyframes blink{
from{opacity:0.4;}
to{opacity:1;}
}

.prize{
color:#8b5e3c;
font-size:36px;
margin:15px 0;
}

/* RUNNING TEXT */

.ticker{
margin-top:55px;
width:100%;
white-space:nowrap;
overflow:hidden;
font-size:30px;
font-weight:600;
color:#7a4e2d;
}

.ticker span{
display:inline-block;
padding-left:100%;
animation:scroll 8s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* CONFETTI */

.confetti{
position:absolute;
top:-10px;
border-radius:3px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

</style>

</head>

<body>

<div class="container">

<div class="sparkle">✨🌼✨</div>

<div class="star">★</div>

<div class="win">SHINY PRIZE!</div>

<h2 class="prize">You got a YELLOW bottle!</h2>

<div class="sparkle">🌼✨🌼</div>

</div>

<div class="ticker">
<span>🌼 Show this screen to the cashier to claim your prize 🌼</span>
</div>

<script>

/* CONFETTI GENERATOR */

let colors=[
"#ffffff",  // putih
"#f5e6c8",  // beige
"#fff4db",  // cream
"#e3b95d",  // kuning tua
"#ffe27a"   // kuning muda
];

for(let i=0;i<160;i++){

let confetti=document.createElement("div");
confetti.className="confetti";

confetti.style.left=Math.random()*100+"%";

let size=Math.random()*10+5; // kecil sampai besar
confetti.style.width=size+"px";
confetti.style.height=size+"px";

confetti.style.background=colors[Math.floor(Math.random()*colors.length)];

confetti.style.animationDuration=(Math.random()*4+3)+"s";

document.body.appendChild(confetti);

}

</script>

</body>
</html>
