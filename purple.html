<!DOCTYPE html>
<html>

<head>
<title>Scoopie Prize</title>

<link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@500;600&family=Baloo+2:wght@500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Baloo 2', cursive;
text-align:center;

background:linear-gradient(
120deg,
#f3e8ff,
#e0d4ff,
#c4b5fd,
#a78bfa,
#c4b5fd,
#e0d4ff,
#f3e8ff
);

height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding-top:400px;

overflow:hidden;
}

/* CARD */

.container{
background:#faf7ff;
padding:40px 22px;   
width:550px;

border-radius:45px;

box-shadow:
0 15px 35px rgba(120, 90, 200, 0.25),
0 0 0 8px #e9ddff,
0 0 0 14px #f5edff;

position:relative;
z-index:3;
}

/* STAR */

.star{
font-size:120px;
color:#c4b5fd;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

/* TITLE */

.win{
font-size:40px;
font-family:'DynaPuff', cursive;
color:#7c3aed;
animation:pop 0.9s ease;
}

@keyframes pop{
0%{transform:scale(0);}
70%{transform:scale(1.25);}
100%{transform:scale(1);}
}

/* SPARKLE */

.sparkle{
font-size:28px;
animation:blink 1.5s infinite alternate;
}

@keyframes blink{
from{opacity:0.4;}
to{opacity:1;}
}

/* PRIZE TEXT */

.prize{
color:#7c3aed;
font-size:36px;
margin:15px 0;
}

/* RUNNING TEXT */

.ticker{
margin-top:55px;
width:100%;
white-space:nowrap;
overflow:hidden;
font-size:32px;
font-weight:600;
color:#6d28d9;
}

.ticker span{
display:inline-block;
padding-left:100%;
animation:scroll 8s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* CONFETTI */

.confetti{
position:absolute;
top:-10px;
border-radius:3px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

</style>

</head>

<body>

<div class="container">

<div class="sparkle">💜✨💜</div>

<div class="star">★</div>

<div class="win">CONGRATS!</div>

<h2 class="prize">You got a PURPLE bottle!</h2>

<div class="sparkle">✨💜✨</div>

</div>

<div class="ticker">
<span>💜 Show this screen to the cashier to claim your prize 💜</span>
</div>

<script>

/* CONFETTI GENERATOR */

let colors=[
"#ffffff",
"#f3e8ff",
"#e9d5ff",
"#d8b4fe",
"#c4b5fd",
"#a78bfa"
];

for(let i=0;i<160;i++){

let confetti=document.createElement("div");
confetti.className="confetti";

confetti.style.left=Math.random()*100+"%";

let size=Math.random()*10+5;
confetti.style.width=size+"px";
confetti.style.height=size+"px";

confetti.style.background=colors[Math.floor(Math.random()*colors.length)];

confetti.style.animationDuration=(Math.random()*4+3)+"s";

document.body.appendChild(confetti);

}

</script>

</body>
</html>
